name: "Weather App - CI: build, scan, push"

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # Budowa obrazu lokalnie (bez wysyłania do rejestru) i zeskanowanie go narzędziem Trivy.
  # Jeśli zostaną wykryte podatności HIGH lub CRITICAL, job zakończy się błędem, a obraz nie zostanie opublikowany w ghcr.io.
  # Podczas budowania zapisywany jest również cache w Docker Hub, który przyspiesza kolejny build.
  scan:
    name: Build (amd64) & CVE Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image to CVE scan
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: weather-app:scan
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/weather-app-cache:cache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/weather-app-cache:cache,mode=max

      - name: Scan CVE (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: weather-app:scan
          format: table
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Uruchamiany tylko po pomyślnym zakończeniu skanowania.
  # Budowa obrazu dla obu architektur (amd64 i arm64), a następnie wysłanie go do ghcr.io.
  # Podczas budowania wykorzystywany jest cache zapisany w Docker Hub, co przyspiesza kolejne uruchomienia pipeline.
  build-and-push:
    name: Multi-arch Build & Push (ghcr.io)
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}
          tags: |
            type=semver,priority=250,pattern={{version}}
            type=semver,priority=200,pattern={{major}}.{{minor}}
            type=semver,priority=150,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,priority=100,prefix=sha-,format=short

      - name: Build and push multi-arch image to ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/weather-app-cache:cache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/weather-app-cache:cache,mode=max